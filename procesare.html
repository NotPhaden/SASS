<head>
<meta charset="UTF-8">
<title>Model Procesare</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
        radial-gradient(circle at 20% 20%, #0ea5e9 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, #6366f1 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, #22c55e 0%, transparent 40%);
    opacity: 0.4;
    filter: blur(100px);
}

.container {
    max-width: 900px;
    margin: 40px auto;
}

.glass {
    padding: 25px;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
}


.alert {
    background: rgba(239,68,68,0.15);
    border: 1px solid #ef4444;
    color: #fecaca;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-weight: bold;
    text-align: center;
}

textarea {
    width: 100%;
    height: 300px;
    background: rgba(0,0,0,0.3);
    border: none;
    padding: 15px;
    color: #94a3b8;
    border-radius: 10px;
    font-size: 14px;
    resize: none;
}


button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #2563eb;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

.back {
    display: inline-block;
    margin-bottom: 15px;
    color: #94a3b8;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="glass">

<a href="index.html" class="back">← Pagina principală</a>

<div class="alert">
⚠️ AVEȚI GRIJĂ LA TITLU! NU FOLOSIȚI: ARME DE CALIBRU MARE / TRAFIC DE ARMAMENT SAU MUNIȚIE!
</div>

<h2>Model Rapid de Procesare</h2>

<textarea readonly>
In data de XX.YY.ZZZZZ, in jurul orei XX:YY echipajele speciale SAS, au inceput o razie pe insula Maldive. La fata locului echipajele prezente au observat mai multe persoane mascate si inarmate care au deschis focul asupra trupelor speciale. Dupa imobilizarea suspectilor acestia au fost transportati la sectia centrala din Los Santos. Domnul X, facea parte din gruparea respectiva. Acesta a fost perchezitionat si asupra sa a fost 1x Arma si X gloante de tip X. Acesta a fost procesat conform codului penal si transportat la penitenciarul din Sandy Shores pentru a-si ispasi pedeapsa!
</textarea>

<button onclick="copyText()">Copiază Text</button>

</div>

</div>

<script>
function copyText(){
    let text = document.querySelector("textarea");
    text.select();
    document.execCommand("copy");
    alert("Text copiat!");
}
</script>

</body>
