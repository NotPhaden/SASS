<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;

    background:
        radial-gradient(circle at 20% 20%, #0ea5e9 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, #6366f1 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, #22c55e 0%, transparent 40%);

    opacity: 0.4;
    filter: blur(100px);
}

.container {
    max-width: 1400px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
}

.glass {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
}

.sidebar {
    padding: 20px;
    border-radius: 20px;
}

.nav-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: #94a3b8;
    margin-bottom: 10px;
}

.nav-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    color: #94a3b8;
    transition: 0.2s;
}

.nav-btn:hover {
    background: rgba(255,255,255,0.05);
    color: white;
}

.nav-btn.active {
    background: #2563eb;
    color: white;
}

.nav-btn small {
    display: block;
    font-size: 11px;
    opacity: 0.7;
}

.main {
    padding: 25px;
    border-radius: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    padding: 15px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(30,58,138,0.4), rgba(16,185,129,0.25));
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
}

.card:hover {
    border-color: #38bdf8;
    transform: translateY(-3px);
}

.code {
    font-size: 22px;
    font-weight: bold;
}

.desc {
    font-size: 14px;
    color: #cbd5f5;
}

.tag {
    float: right;
    font-size: 10px;
    padding: 4px 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    color: #38bdf8;
}


.section {
    display: none;
}

.section.active {
    display: block;
}

</style>

</head>

<body>

<script>
function showSection(id, el){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");

    if(id === "codes"){
        document.getElementById("title").innerText = "Hartă Cayo";
    } else {
        document.getElementById("title").innerText = "Vestimentație";
    }
}
</script>
